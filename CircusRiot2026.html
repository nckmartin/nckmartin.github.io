<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        #password-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        #password-screen input {
            padding: 10px;
            font-size: 1em;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #password-screen button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #007acc;
            color: white;
        }
        #password-screen button:hover {
            background: #005f99;
        }
        #error-msg {
            color: red;
            display: none;
        }
        #content {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }
        #content img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="password-screen">
        <h2>This page is password protected</h2>
        <input type="password" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPassword()">
        <button onclick="checkPassword()">Enter</button>
        <p id="error-msg">Incorrect password. Try again.</p>
    </div>
    <div id="content">
        <h1>Save the Date!</h1>
        <img src="party.png" alt="Party">
        <p>Details coming soon...</p>
    </div>
    <script>
        function checkPassword() {
            var input = document.getElementById('password-input').value;
            if (input === 'password123') {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
